projects:
  - name: GFED Medusa Backend and DB
    environments:
      - name: Production
        services:
          - type: web
            runtime: image
            plan: standard
            name: gfed-medusa-be
            region: frankfurt
            autoDeployTrigger: off
            image:
              url: ghcr.io/goodfrontend/gfed-medusa-backend/medusa:prod-latest
            envVars:
              - fromGroup: backend-env-group-prod
              - key: DATABASE_URL
                fromDatabase:
                  name: gfed-medusa-database-paid
                  property: connectionString
              - key: DB_NAME
                fromDatabase:
                  name: gfed-medusa-database-paid
                  property: database
        databases:
          - name: gfed-medusa-database
            databaseName: gfed_medusa_database_free6
            user: gfed_medusa_database_free6_user
            plan: free
            region: frankfurt
            ipAllowList:
              - source: 0.0.0.0/0
                description: everywhere
            postgresMajorVersion: '18'
          - name: gfed-medusa-database-paid
            databaseName: gfed_medusa_database_paid7
            user: gfed_medusa_database_paid7_user
            plan: basic-1gb
            diskSizeGB: 1
            region: frankfurt
            ipAllowList:
              - source: 0.0.0.0/0
                description: everywhere
            postgresMajorVersion: '18'
      - name: QA
        services:
          - type: web
            runtime: image
            plan: free
            name: gfed-medusa-be-qa
            region: frankfurt
            autoDeployTrigger: off
            image:
              url: ghcr.io/goodfrontend/gfed-medusa-backend/medusa:qa-latest
            envVars:
              - fromGroup: backend-env-group-qa
      - name: Smoke
        services:
          - type: web
            runtime: image
            plan: free
            name: gfed-medusa-be-smoke
            region: frankfurt
            autoDeployTrigger: off
            image:
              url: ghcr.io/goodfrontend/gfed-medusa-backend/medusa:smoke-latest
            envVars:
              - fromGroup: backend-env-group-smoke
